name: GitHub Classroom Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install pytest matplotlib --quiet

      - name: Section A
        id: section-a
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Section A - Code runs
          setup-command: python -m pip install pytest matplotlib --quiet
          command: python -m pytest tests/test_assignment2.py::TestCodeRuns -v
          timeout: 120
          max-score: 25

      - name: Section B
        id: section-b
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Section B - Plot files
          setup-command: ""
          command: python -m pytest tests/test_assignment2.py::TestPlotsExist -v
          timeout: 30
          max-score: 25

      - name: Section C
        id: section-c
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Section C - README filled
          setup-command: ""
          command: python -m pytest tests/test_assignment2.py::TestREADME -v
          timeout: 30
          max-score: 35

      - name: Section D
        id: section-d
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Section D - Code modified
          setup-command: ""
          command: python -m pytest tests/test_assignment2.py::TestCodeModified -v
          timeout: 30
          max-score: 15

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          SECTION-A-RESULTS: "${{ steps.section-a.outputs.result }}"
          SECTION-B-RESULTS: "${{ steps.section-b.outputs.result }}"
          SECTION-C-RESULTS: "${{ steps.section-c.outputs.result }}"
          SECTION-D-RESULTS: "${{ steps.section-d.outputs.result }}"
        with:
          runners: section-a,section-b,section-c,section-d
